name: CI

on:
  push:
  pull_request:

jobs:
  rust-and-python:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install maturin
        run: python -m pip install --upgrade pip maturin

      - name: Rust fmt
        run: cargo fmt --check

      - name: Rust clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Rust tests
        run: cargo test

      - name: Cargo package smoke test
        run: cargo package --allow-dirty --no-verify

      - name: Build extension
        run: |
          python -m venv .venv
          . .venv/bin/activate
          maturin develop

      - name: Python tests
        run: |
          . .venv/bin/activate
          python -m unittest discover -s tests -p 'test_*.py' -v

      - name: CLI smoke test
        run: |
          . .venv/bin/activate
          python -m ezsxf
